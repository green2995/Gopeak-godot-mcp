name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Smoke / integration test
        env:
          GODOT_PATH: /bin/true
          GOPEAK_BRIDGE_HOST: 127.0.0.1
          GOPEAK_BRIDGE_PORT: 6505
        run: npm run test:ci
